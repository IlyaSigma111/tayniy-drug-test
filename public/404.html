<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Письмо от тайного друга</title>
  <style>
    body { margin: 0; background: #0a0e1a; color: #94a3b8; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; }
    .loader { text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid #1e293b; border-top-color: #4169e1; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Перенаправление...</p>
  </div>
  <script>
    (function() {
      var segment = window.location.pathname.replace(/^\/tayniy-drug\/?/, '');
      var hash = segment ? '/tayniy-drug/#/' + segment : '/tayniy-drug/#/';
      setTimeout(function() { window.location.replace(hash); }, 100);
    })();
  </script>
</body>
</html>
